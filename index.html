<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e63946">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GymApp">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <svg class="dumbbell-icon" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
        <rect x="0"  y="14" width="12" height="12" rx="3" fill="#e63946"/>
        <rect x="12" y="10" width="8"  height="20" rx="2" fill="#e63946"/>
        <rect x="20" y="17" width="60" height="6"  rx="3" fill="#c1121f"/>
        <rect x="80" y="10" width="8"  height="20" rx="2" fill="#e63946"/>
        <rect x="88" y="14" width="12" height="12" rx="3" fill="#e63946"/>
      </svg>
      <h1>Gym App</h1>
      <svg class="dumbbell-icon flip" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
        <rect x="0"  y="14" width="12" height="12" rx="3" fill="#e63946"/>
        <rect x="12" y="10" width="8"  height="20" rx="2" fill="#e63946"/>
        <rect x="20" y="17" width="60" height="6"  rx="3" fill="#c1121f"/>
        <rect x="80" y="10" width="8"  height="20" rx="2" fill="#e63946"/>
        <rect x="88" y="14" width="12" height="12" rx="3" fill="#e63946"/>
      </svg>
    </div>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <button onclick="showTab('allenamento')" class="active">
      <span class="nav-icon">&#x1F4AA;</span><br>ALLENAMENTO
    </button>
    <button onclick="showTab('giorni')">
      <span class="nav-icon">&#x1F4C5;</span><br>SCHEDE
    </button>
    <button onclick="showTab('impostazioni')">
      <span class="nav-icon">&#x2699;&#xFE0F;</span><br>IMPOSTAZIONI
    </button>
    <button onclick="showTab('progressi')">
      <span class="nav-icon">&#x1F4C8;</span><br>PROGRESSI
    </button>
  </div>

  <!-- CONTENUTO PRINCIPALE -->
  <div class="main-content">
    <div class="container">
      <div id="mainContent"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <svg viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg" class="footer-icon">
      <rect x="0"  y="7" width="7"  height="6" rx="2" fill="#333"/>
      <rect x="7"  y="5" width="5"  height="10" rx="1" fill="#333"/>
      <rect x="12" y="8" width="36" height="4" rx="2" fill="#2a2a2a"/>
      <rect x="48" y="5" width="5"  height="10" rx="1" fill="#333"/>
      <rect x="53" y="7" width="7"  height="6" rx="2" fill="#333"/>
    </svg>
    Gym App &mdash; created by Nicola Giurgola
  </div>

  <script src="script.js"></script>
</body>
</html>
